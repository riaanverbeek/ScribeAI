workflows:
  ios-workflow:
    name: ScribeAI iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Dev Account
    environment:
      xcode: "16.3"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fant.app
      vars:
        APP_STORE_APPLE_ID: "6761292458"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Patch Capacitor plugins for SPM
        script: bash scripts/patch-ios-spm-plugins.sh
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=TFC54G8539 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="ScribeAI App Store v2" \
            -allowProvisioningUpdates \
            -clonedSourcePackagesDirPath $CM_BUILD_DIR/SourcePackages \
            | xcpretty

          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa \
            | xcpretty
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: ScribeAI Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      java: 21
      android_signing:
        - ScribeAI
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.fant.app"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
