<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>ScribeAI — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
    }

    .logo span {
      color: #6366f1;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.12);
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon-wrap svg {
      width: 32px;
      height: 32px;
      color: #818cf8;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: #6366f1;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: #e2e8f0;
      border: 1.5px solid rgba(255,255,255,0.1);
    }

    .recorder-section {
      display: none;
      margin-top: 2rem;
      width: 100%;
      max-width: 320px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #475569;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .record-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #6366f1;
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(99,102,241,0.4);
    }

    .record-btn.recording {
      background: #ef4444;
      animation: pulse 1.5s ease-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(239,68,68,0.5); }
      70%  { box-shadow: 0 0 0 16px rgba(239,68,68,0);   }
      100% { box-shadow: 0 0 0 0   rgba(239,68,68,0);    }
    }

    .record-btn svg { width: 32px; height: 32px; }

    .record-status {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1rem;
      min-height: 1.25rem;
    }

    .record-status.active { color: #f87171; font-weight: 500; }

    .stop-btn {
      display: none;
      padding: 0.6rem 1.25rem;
      border-radius: 0.6rem;
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      border: 1.5px solid rgba(239,68,68,0.3);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    .save-note {
      display: none;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #34d399;
    }
  </style>
</head>
<body>
  <div class="logo">Scribe<span>AI</span></div>

  <div class="icon-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>ScribeAI couldn't reach the server. Check your connection and try again.</p>

  <button class="btn btn-primary" onclick="reload()">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>
    Try Again
  </button>

  <div id="nativeRecorderWrap">
    <button class="btn btn-secondary" id="showRecorderBtn" onclick="showRecorder()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
      </svg>
      Record audio offline
    </button>
  </div>

  <div class="recorder-section" id="recorderSection">
    <div class="divider">or record while offline</div>

    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
      </svg>
    </button>

    <div class="record-status" id="recordStatus">Tap to record</div>
    <button class="stop-btn" id="stopBtn" onclick="stopRecording()">Stop & Save</button>
    <div class="save-note" id="saveNote">Recording saved to your device. Upload it when you're back online.</div>
  </div>

  <script src="recorder.js"></script>
  <script>
    function reload() {
      window.location.reload();
    }

    function showRecorder() {
      document.getElementById('nativeRecorderWrap').style.display = 'none';
      document.getElementById('recorderSection').style.display = 'block';
    }

    let isRecording = false;

    function toggleRecording() {
      if (isRecording) return;
      startRecordingOffline();
    }

    async function startRecordingOffline() {
      if (typeof NativeRecorder === 'undefined') {
        alert('Native recording is not available in this context.');
        return;
      }
      try {
        await NativeRecorder.startRecording();
        isRecording = true;
        const btn = document.getElementById('recordBtn');
        btn.classList.add('recording');
        document.getElementById('recordStatus').textContent = 'Recording…';
        document.getElementById('recordStatus').classList.add('active');
        document.getElementById('stopBtn').style.display = 'inline-flex';
      } catch (e) {
        alert('Could not start recording: ' + (e.message || e));
      }
    }

    async function stopRecording() {
      if (!isRecording || typeof NativeRecorder === 'undefined') return;
      try {
        const { base64, mimeType } = await NativeRecorder.stopRecording();
        isRecording = false;
        const btn = document.getElementById('recordBtn');
        btn.classList.remove('recording');
        document.getElementById('recordStatus').textContent = 'Saving…';
        NativeRecorder.downloadRecording(base64, mimeType);
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('recordStatus').textContent = 'Done';
        document.getElementById('recordStatus').classList.remove('active');
        document.getElementById('saveNote').style.display = 'block';
      } catch (e) {
        alert('Could not stop recording: ' + (e.message || e));
      }
    }
  </script>
</body>
</html>
